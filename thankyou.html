<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dziękujemy!</title>
  <link rel="stylesheet" href="style.css">

  <style>
    body {
      background: #f7f7f7;
      font-family: "Playfair Display", serif;
      text-align: center;
      padding: 80px 20px;
      color: #333;
    }

    .thankyou-box {
      max-width: 500px;
      margin: 0 auto;
      background: #fff;
      padding: 2.5rem;
      border-radius: 16px;
      border: 2px solid rgba(180, 180, 180, 0.35);
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
    }

    p {
      font-size: 1.1rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    a {
      display: inline-block;
      padding: 0.9rem 1.8rem;
      background: #ffffff;
      border: 2px solid rgba(180, 180, 180, 0.45);
      border-radius: 14px;
      font-size: 1rem;
      text-decoration: none;
      color: #333;
      transition: 0.3s ease;
      box-shadow: 0 8px 20px rgba(0,0,0,0.06);
    }

    a:hover {
      background: #f7f7f7;
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(0,0,0,0.12);
    }
  </style>
</head>

<body>
  <div class="thankyou-box">
    <h1>Dziękujemy!</h1>
    <p>Twoje potwierdzenie zostało wysłane pomyślnie.<br>
    Do zobaczenia na naszym ślubie!</p>

    <a href="index.html">Wróć na stronę główną</a>
  </div>
</body>
</html>
